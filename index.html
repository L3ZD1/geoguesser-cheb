<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Chuvashia Guessr</title>

  <script src="https://api-maps.yandex.ru/2.1/?apikey=6709e2f0-92c2-4e19-b042-cfa1f259838d&lang=ru_RU"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin: 10px;
    }

    #panorama {
      width: 100%;
      height: 400px;
    }

    #map {
      width: 100%;
      height: 300px;
    }

    .controls {
      margin: 15px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
    }

    #result {
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Chuvashia Guessr</h1>
<p>Угадай место по панораме 👇</p>

<div id="panorama"></div>
<div id="map"></div>

<div class="controls">
  <button onclick="newLocation()">🎲 Новое место</button>
  <button onclick="checkGuess()">✅ Проверить</button>
</div>

<p id="result"></p>

<script>
let map;
let player;
let guessPlacemark;
let guessCoords = null;
let currentCoords;

const locations = [
  [56.132, 47.251], // Чебоксары
  [56.111, 47.478],
  [56.140, 47.320],
  [56.095, 47.210],
  [56.120, 47.150],
  
  [55.865, 47.479], // Новочебоксарск
  [55.850, 47.500],
  [55.890, 47.450],

  [55.490, 46.550], // Канаш
  [55.480, 46.600],
  [55.520, 46.520],

  [55.870, 46.350], // Шумерля
  [55.880, 46.300],
  [55.850, 46.370],

  [55.960, 47.600], // Цивильск
  [55.940, 47.580],
  [55.980, 47.620],

  [55.550, 47.460], // Батырево
  [55.530, 47.420],
  [55.570, 47.500],

  [55.650, 46.900], // Вурнары
  [55.630, 46.880],
  [55.680, 46.920],

  [55.200, 46.300], // Алатырь
  [55.180, 46.250],
  [55.230, 46.350],

  [55.300, 47.200], // Комсомольское
  [55.280, 47.180],
  [55.320, 47.240],

  [56.200, 47.100], // Моргауши
  [56.180, 47.050],
  [56.220, 47.120],

  [55.750, 47.900], // Ядрин
  [55.730, 47.850],
  [55.780, 47.950],

  [55.900, 46.800], // Ибреси
  [55.920, 46.820],
  [55.880, 46.780],

  [56.050, 47.700], // Козловка
  [56.030, 47.750],
  [56.070, 47.680],

  [56.300, 47.400], // трассы / деревни
  [56.250, 47.300],
  [56.200, 47.500],
  [56.150, 47.600],
  [56.100, 47.700],

  [55.700, 47.200],
  [55.600, 47.100],
  [55.500, 47.000],
  [55.400, 46.900],
  [55.300, 46.800],

  [55.800, 47.300],
  [55.850, 47.350],
  [55.900, 47.400],
  [55.950, 47.450],
  [56.000, 47.500]
];

ymaps.ready(init);

function init() {
  map = new ymaps.Map("map", {
    center: [55.7, 47.2],
    zoom: 7
  });

  map.events.add('click', function (e) {
    guessCoords = e.get('coords');

    if (guessPlacemark) {
      map.geoObjects.remove(guessPlacemark);
    }

    guessPlacemark = new ymaps.Placemark(guessCoords);
    map.geoObjects.add(guessPlacemark);
  });

  newLocation();
}

function showPanorama(coords) {
  currentCoords = coords;

  ymaps.panorama.locate(coords).done(function (panoramas) {
    if (panoramas.length > 0) {

      if (player) {
        player.destroy();
      }

      player = new ymaps.panorama.Player(
        'panorama',
        panoramas[0],
        { controls: ['zoomControl'] }
      );

    } else {
      alert("Нет панорамы 😢");
    }
  });
}

function newLocation() {
  const random = Math.floor(Math.random() * locations.length);
  showPanorama(locations[random]);

  guessCoords = null;

  if (guessPlacemark) {
    map.geoObjects.remove(guessPlacemark);
  }

  document.getElementById("result").innerText = "";
}

function getDistance(a, b) {
  const R = 6371;

  const dLat = (b[0] - a[0]) * Math.PI / 180;
  const dLon = (b[1] - a[1]) * Math.PI / 180;

  const lat1 = a[0] * Math.PI / 180;
  const lat2 = b[0] * Math.PI / 180;

  const x = dLon * Math.cos((lat1 + lat2) / 2);
  const y = dLat;

  return Math.sqrt(x*x + y*y) * R;
}

function checkGuess() {
  if (!guessCoords) {
    alert("Кликни на карту!");
    return;
  }

  const dist = getDistance(currentCoords, guessCoords);

  document.getElementById("result").innerText =
    "Ты ошибся на " + dist.toFixed(2) + " км";

  // показать правильную точку
  const realPlacemark = new ymaps.Placemark(currentCoords, {}, {
    preset: 'islands#redIcon'
  });

  map.geoObjects.add(realPlacemark);
}
</script>

</body>
</html>
