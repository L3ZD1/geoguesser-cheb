<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Chuvashia Guessr</title>

    <script src="https://api-maps.yandex.ru/2.1/?apikey=6709e2f0-92c2-4e19-b042-cfa1f259838d&lang=ru_RU"></script>

    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        #map {
            width: 90%;
            height: 400px;
            margin: 20px auto;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Chuvashia Guessr</h1>

    <div id="map"></div>

    <button onclick="newLocation()">Новое место</button>

    <script>
        let map;

        const locations = [
            [56.132, 47.251],
            [55.864, 47.467],
            [55.496, 46.889],
            [55.735, 47.018]
        ];

        ymaps.ready(init);

        function init() {
            map = new ymaps.Map("map", {
                center: locations[0],
                zoom: 14
            });

            showPanorama(locations[0]);
        }

        function showPanorama(coords) {
            ymaps.panorama.locate(coords).done(function (panoramas) {
                if (panoramas.length > 0) {
                    var player = new ymaps.panorama.Player(
                        'map',
                        panoramas[0],
                        { controls: ['zoomControl'] }
                    );
                } else {
                    alert("Нет панорамы в этом месте 😢");
                }
            });
        }

        function newLocation() {
            const random = Math.floor(Math.random() * locations.length);
            showPanorama(locations[random]);
        }
    </script>

</body>
</html>
