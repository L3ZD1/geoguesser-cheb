<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Chuvashia Guessr</title>

  <script src="https://api-maps.yandex.ru/2.1/?apikey=6709e2f0-92c2-4e19-b042-cfa1f259838d&lang=ru_RU"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #panorama {
      width: 100%;
      height: 400px;
    }

    #map {
      width: 100%;
      height: 300px;
    }

    .controls {
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }

    #result {
      margin-top: 10px;
      font-size: 18px;
    }

    #stats {
      margin-top: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h1>Chuvashia Guessr</h1>

<div id="panorama"></div>
<div id="map"></div>

<div class="controls">
  <button onclick="newLocation()">🎲 Новое место</button>
  <button onclick="checkGuess()">✅ Проверить</button>
</div>

<div id="stats">
  Очки: 0 | Уровень: Новичок | Стрик: 0
</div>

<p id="result"></p>

<script>
let map;
let player;

let guessPlacemark;
let realPlacemark;

let guessCoords = null;
let currentCoords;

// прогресс
let score = 0;
let streak = 0;

const bounds = {
  latMin: 54.9,
  latMax: 56.5,
  lonMin: 45.8,
  lonMax: 48.2
};

ymaps.ready(init);

function init() {
  map = new ymaps.Map("map", {
    center: [55.7, 47.2],
    zoom: 7
  });

  map.events.add('click', function (e) {
    guessCoords = e.get('coords');

    if (guessPlacemark) map.geoObjects.remove(guessPlacemark);

    guessPlacemark = new ymaps.Placemark(guessCoords);
    map.geoObjects.add(guessPlacemark);
  });

  newLocation();
}

function showPanorama(coords) {
  currentCoords = coords;

  ymaps.panorama.locate(coords).done(function (panoramas) {
    if (panoramas.length > 0) {
      if (player) player.destroy();

      player = new ymaps.panorama.Player('panorama', panoramas[0]);
    } else {
      findValidPanorama();
    }
  });
}

function newLocation() {
  guessCoords = null;

  // 🧹 УДАЛЯЕМ ВСЁ С КАРТЫ
  map.geoObjects.removeAll();

  document.getElementById("result").innerText = "Поиск панорамы...";

  findValidPanorama();
}

function findValidPanorama() {
  const lat = bounds.latMin + Math.random() * (bounds.latMax - bounds.latMin);
  const lon = bounds.lonMin + Math.random() * (bounds.lonMax - bounds.lonMin);

  const coords = [lat, lon];

  ymaps.panorama.locate(coords).done(function (panoramas) {
    if (panoramas.length > 0) {
      document.getElementById("result").innerText = "";
      showPanorama(coords);
    } else {
      findValidPanorama();
    }
  });
}

function getDistance(a, b) {
  const R = 6371;

  const dLat = (b[0] - a[0]) * Math.PI / 180;
  const dLon = (b[1] - a[1]) * Math.PI / 180;

  const lat1 = a[0] * Math.PI / 180;
  const lat2 = b[0] * Math.PI / 180;

  const x = dLon * Math.cos((lat1 + lat2) / 2);
  const y = dLat;

  return Math.sqrt(x*x + y*y) * R;
}

function getLevel(points) {
  if (points < 100) return "Новичок";
  if (points < 300) return "Любитель";
  if (points < 700) return "Профи";
  return "Гео-Бог";
}

function checkGuess() {
  if (!guessCoords) {
    alert("Кликни на карту!");
    return;
  }

  const dist = getDistance(currentCoords, guessCoords);

  // 🎯 система очков
  let gained = Math.max(0, 100 - dist);

  score += gained;

  // 🔥 стрик
  if (dist < 10) {
    streak++;
  } else {
    streak = 0;
  }

  document.getElementById("result").innerText =
    `Ошибка: ${dist.toFixed(2)} км | +${gained.toFixed(0)} очков`;

  // показать правильную точку
  realPlacemark = new ymaps.Placemark(currentCoords, {}, {
    preset: 'islands#redIcon'
  });

  map.geoObjects.add(realPlacemark);

  updateStats();
}

function updateStats() {
  document.getElementById("stats").innerText =
    `Очки: ${Math.floor(score)} | Уровень: ${getLevel(score)} | Стрик: ${streak}`;
}
</script>

</body>
</html>
