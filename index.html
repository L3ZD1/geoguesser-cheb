<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Chuvashia Guessr</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: white;
        }

        iframe {
            width: 90%;
            height: 400px;
            border: none;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Chuvashia Guessr</h1>
    <p>Попробуй угадать место 👇</p>

    <iframe id="mapFrame"></iframe>

    <br>
    <button onclick="newLocation()">Новое место</button>

    <script>
const locations = [
  "https://yandex.ru/maps/?ll=47.251%2C56.132&z=14&l=stv",
  "https://yandex.ru/maps/?ll=47.467%2C55.864&z=14&l=stv",
  "https://yandex.ru/maps/?ll=46.889%2C55.496&z=14&l=stv",
  "https://yandex.ru/maps/?ll=47.018%2C55.735&z=14&l=stv"
];

function newLocation() {
  const random = Math.floor(Math.random() * locations.length);
  document.getElementById("mapFrame").src = locations[random];
}

newLocation();
    </script>

</body>
</html>
